<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AquaSecure AI</title>
    <script>
      var redirect = sessionStorage.redirect;
      sessionStorage.removeItem('redirect');
      location.replace(redirect && redirect !== location.href ? redirect : '/');
    </script>
  </head>
  <body>
    <noscript>
      <meta http-equiv="refresh" content="0;url=/">
    </noscript>
  </body>
</html>
