<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AquaSecure AI</title>
    <script>
      // Encode the full path + query + hash into a query param, then redirect to root
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(
        window.location.origin + '/?p=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
